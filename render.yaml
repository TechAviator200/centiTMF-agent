services:
  - type: web
    name: centitmf-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      # ── Database (Supabase Postgres) ──────────────────────────────────────
      # Set these in the Render dashboard — do not commit real values.
      - key: DATABASE_URL
        sync: false
      - key: SYNC_DATABASE_URL
        sync: false

      # ── Object Storage (Cloudflare R2) ────────────────────────────────────
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: auto

      # ── AI (optional) ─────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── Runtime ───────────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: INFO
